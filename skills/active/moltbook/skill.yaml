      memory_may_inform_but_not_replace: true
    safety:
      read_only: true
      requires_approval: false
      allow_redirects: false

  - name: moltbook_post_comments
    description: Read comments for a Moltbook post. Read-only.
    method: GET
    url: https://www.moltbook.com/api/v1/posts/{post_id}/comments
    args_schema:
      type: object
      properties:
        post_id:
          type: string
          minLength: 1
          description: Moltbook post id.
        sort:
          type: string
          enum: [top, new, controversial]
          default: top
          description: Comment sort order.
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 25
          description: Maximum number of comments to return.
      required: [post_id]
    query:
